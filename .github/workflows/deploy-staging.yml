name: Deploy → Staging

on:
  push:
    branches: [main]

env:
  PROJECT_ID: nextera-portfolio
  REGION: us-east1
  SERVICE: energy-forecast-staging
  REPO: portfolio
  IMAGE: us-east1-docker.pkg.dev/nextera-portfolio/portfolio/energy-forecast

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy to Cloud Run (Staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:staging-latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:staging-latest

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 2 \
            --set-secrets "EIA_API_KEY=eia-api-key:latest" \
            --set-env-vars "ENVIRONMENT=staging,LOG_LEVEL=DEBUG" \
            --tag "sha-$(echo ${{ github.sha }} | cut -c1-7)"

      - name: Get staging URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Staging deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test staging
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Testing $URL ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Staging health check failed after 5 attempts"
          exit 1
