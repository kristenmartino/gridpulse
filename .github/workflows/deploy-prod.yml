name: Deploy -> Production

# Gated behind CI (PR-G2 / #146): this workflow only runs after the "CI"
# workflow completes on main. The job-level ``if`` below requires CI to
# have *succeeded* — ``workflow_run`` fires on completion regardless of
# outcome, so the guard is what actually blocks a broken commit from
# deploying. Previously this triggered on every push to main independent
# of CI, so a red build could ship to production.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: nextera-portfolio
  REGION: us-east1
  SERVICE: gridpulse
  REPO: portfolio
  IMAGE: us-east1-docker.pkg.dev/nextera-portfolio/portfolio/gridpulse
  # Race-free deploy target: the exact commit CI validated, NOT main's
  # current HEAD. Under ``workflow_run`` a newer commit may have landed
  # on main between CI passing and this workflow starting; deploying
  # ``github.sha`` (main HEAD) would ship un-validated code. Pin to the
  # SHA the triggering CI run actually tested.
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Build & Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest
    # Only deploy when the triggering CI run SUCCEEDED. ``workflow_run``
    # delivers failed + cancelled runs too; without this guard a red CI
    # would still deploy.
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit CI validated (see DEPLOY_SHA note).
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }} \
            -t ${{ env.IMAGE }}:prod-latest \
            .
          docker push ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }}
          docker push ${{ env.IMAGE }}:prod-latest

      - name: Deploy to Cloud Run (Production)
        run: |
          # Cost/DoS ceiling note (#253): --max-instances 4 is the effective
          # spend cap on this --allow-unauthenticated service (~$456/mo pinned
          # at max vs ~$114 idle). The web-tier guard backstops it: per-IP rate
          # limiting (API_RATE_LIMIT_PER_MIN / DASH_RATE_LIMIT_PER_MIN, with
          # RATE_LIMIT_EXEMPT_IPS for trusted shared-NAT egress), a pinned-at-max
          # alert, and a billing budget (docs/monitoring/). METRICS_ALLOWED_IPS
          # gates detailed /health + /metrics; unset here → deny-by-default.
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --min-instances 1 \
            --max-instances 4 \
            --cpu-boost \
            --no-cpu-throttling \
            --vpc-connector wattcast-connector \
            --set-secrets "EIA_API_KEY=eia-api-key:latest" \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,GCS_BUCKET_NAME=nextera-portfolio-energy-cache,GCS_ENABLED=true,REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=6379,REQUIRE_REDIS=true,PRECOMPUTE_ENABLED=false"

      # The scoring + training Cloud Run Jobs run from the same container image
      # but with different entrypoints. Cloud Scheduler invokes them on cron
      # (hourly scoring, daily training). See docs/SCHEDULED_JOBS.md for the
      # one-time setup of the scheduler entries and service-account IAM.
      - name: Deploy scoring job (Production)
        # task-timeout 1800 (30m): the run scores all 51 BAs across a
        # PRECOMPUTE_MAX_WORKERS=4 thread pool with a cold ephemeral cache each
        # tick (full EIA + Open-Meteo fetch per BA). Healthy runtime is ~855s
        # (1083-1333s under elevated upstream latency) and crept toward the old
        # 900s cap as features were added (ERA5 archive+forecast stitch #163,
        # drift stats PR-G9), until normal upstream-latency variance tipped it
        # over on 2026-06-01 and four consecutive ticks timed out (09:00–12:00
        # UTC, last_scored stale ~4.5h). Bumped 900→1800 for headroom; still
        # well inside the hourly cadence so runs can't overlap. Per-BA fetches
        # are already parallelized (the 4-worker pool); #171 adds the missing
        # piece — a runtime-creep alert that warns on APPROACH before a timeout
        # (docs/monitoring/scoring_runtime_creep_alert.json). Keep
        # SCORING_TASK_TIMEOUT_S in config.py in lockstep with any --task-timeout
        # change here, or the alarm goes stale. Mirrors the training-job
        # 7200→18000 bump on 2026-05-03.
        run: |
          gcloud run jobs deploy gridpulse-scoring-job \
            --image ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }} \
            --region ${{ env.REGION }} \
            --service-account "gridpulse-job@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector wattcast-connector \
            --set-secrets "EIA_API_KEY=eia-api-key:latest" \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,GCS_BUCKET_NAME=nextera-portfolio-energy-cache,GCS_ENABLED=true,REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=6379" \
            --command python \
            --args=-m,jobs,scoring \
            --task-timeout 1800 \
            --memory 4Gi \
            --cpu 2 \
            --max-retries 1

      - name: Deploy training job (Production)
        # task-timeout 18000 (5h): individual task budget.
        #
        # tasks 3, parallelism 3: each Cloud Run Job execution fans out
        # to three parallel tasks; ``jobs/training_job._partition_regions_for_task``
        # gives each task an interleaved-stride slice of the 51-BA list.
        # The 2026-05-06 manual run cleared 24 of 51 in 5h with one
        # task at ~12.5 min/BA average. 17 BAs per task × 12.5 min ≈
        # 3.5h, comfortably within the 5h budget.
        #
        # ``models.persistence._write_latest`` uses GCS optimistic
        # concurrency (If-Generation-Match) so concurrent pointer
        # updates from parallel tasks can't silently drop each
        # other's entries.
        #
        # max-retries 0: each retry restarts from BA 0 of THIS task
        # instead of resuming. The resume logic in training_job
        # (skip if data_hash matches) makes a *fresh execution* the
        # right path forward — let the next scheduled run pick up
        # where this one left off, don't waste a retry.
        run: |
          gcloud run jobs deploy gridpulse-training-job \
            --image ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }} \
            --region ${{ env.REGION }} \
            --service-account "gridpulse-job@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector wattcast-connector \
            --set-secrets "EIA_API_KEY=eia-api-key:latest" \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,GCS_BUCKET_NAME=nextera-portfolio-energy-cache,GCS_ENABLED=true,REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=6379" \
            --command python \
            --args=-m,jobs,training \
            --task-timeout 18000 \
            --tasks 3 \
            --parallelism 3 \
            --memory 8Gi \
            --cpu 4 \
            --max-retries 0

      - name: Get production URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DEPLOY_SHA }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**CI run:** [#${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }})" >> $GITHUB_STEP_SUMMARY

      # Meaningful post-deploy smoke (PR-G3 / #147). Hits /health?deep=1
      # and applies deploy-scoped assertions:
      #   HARD FAIL when the fresh revision is not serving, or cannot
      #     reach Redis — both are deploy-config problems (broken image,
      #     wrong VPC connector, bad REDIS_HOST/secret).
      #   WARN ONLY when data is stale/empty (last_scored old, forecast
      #     sample empty) — those are NOT caused by the deploy; the next
      #     scoring tick fixes them and continuous monitoring (#150)
      #     alerts on them. Rolling back a good revision for a stale-data
      #     condition would be wrong.
      - name: Production health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Probing $URL/health?deep=1 ..."
          BODY=""
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL/health?deep=1" || true)
            if [ "$CODE" = "200" ]; then
              echo "App is serving (HTTP 200)"
              BODY=$(cat /tmp/health.json)
              break
            fi
            echo "Attempt $i: HTTP $CODE - retrying in 15s..."
            sleep 15
          done

          if [ -z "$BODY" ]; then
            echo "::error::Production not serving — /health never returned 200"
            echo "ROLLBACK: gcloud run services update-traffic ${{ env.SERVICE }} --to-revisions=PREVIOUS=100 --region ${{ env.REGION }}"
            exit 1
          fi

          echo "$BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(json.dumps(d, indent=2))
          status = d.get('status')
          checks = d.get('checks', {})
          redis = checks.get('redis', {})

          # HARD FAIL: fresh prod revision must reach Redis (deploy-config).
          if redis.get('status') == 'degraded':
              print('::error::Fresh revision cannot reach Redis — check VPC connector / REDIS_HOST / secret')
              sys.exit(1)

          # WARN-ONLY: stale/empty data is not deploy-caused.
          if status != 'healthy':
              degraded = {k: v for k, v in checks.items() if v.get('status') == 'degraded'}
              print(f'::warning::Deploy is serving + Redis reachable, but health is degraded (monitoring concern, not a deploy failure): {list(degraded)}')

          print('Deploy smoke passed: serving + Redis reachable.')
          " || exit 1

          {
            echo "**Post-deploy health:** \`$(echo "$BODY" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')\`"
          } >> $GITHUB_STEP_SUMMARY
