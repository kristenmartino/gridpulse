name: Deploy -> Production

on:
  push:
    branches: [main]

env:
  PROJECT_ID: nextera-portfolio
  REGION: us-east1
  SERVICE: gridpulse
  REPO: portfolio
  IMAGE: us-east1-docker.pkg.dev/nextera-portfolio/portfolio/gridpulse

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Build & Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:prod-latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:prod-latest

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --timeout 300 \
            --min-instances 1 \
            --max-instances 4 \
            --cpu-boost \
            --vpc-connector wattcast-connector \
            --set-secrets "EIA_API_KEY=eia-api-key:latest" \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,GCS_BUCKET_NAME=nextera-portfolio-energy-cache,GCS_ENABLED=true,REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=6379"

      - name: Get production URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Production health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Testing $URL ..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - retrying in 15s..."
            sleep 15
          done
          echo "Production health check failed - ROLLBACK MAY BE NEEDED"
          echo "Run: gcloud run services update-traffic ${{ env.SERVICE }} --to-revisions=PREVIOUS_REVISION=100 --region ${{ env.REGION }}"
          exit 1
