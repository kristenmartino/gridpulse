name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No hardcoded secrets
        run: |
          PATTERNS='AIza|sk-[a-zA-Z0-9]{20,}|AKIA|ghp_|API_KEY=["\x27]?[a-zA-Z0-9]{20,}'
          MATCHES=$(grep -rEn "$PATTERNS" --include="*.py" --include="*.yml" --include="*.yaml" \
            --exclude-dir=tests --exclude-dir=.github --exclude-dir=.venv . || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: Possible hardcoded secrets detected:"
            echo "$MATCHES"
            exit 1
          fi
      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "FAIL: .env is tracked in git — remove with git rm --cached .env"
            exit 1
          fi
      - name: Check .env.example has placeholders
        run: |
          grep -q "your_" .env.example || (echo "FAIL: .env.example missing placeholders" && exit 1)

  lint:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff mypy
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Unit Tests
        run: pytest tests/unit/ -v --tb=short -m "not slow"
      - name: Integration Tests
        run: pytest tests/integration/ -v --tb=short
      - name: E2E Tests
        run: pytest tests/e2e/ -v --tb=short
      - name: Coverage Report
        run: |
          pytest tests/ -m "not slow" \
            --cov=data --cov=models --cov=simulation --cov=personas --cov=components \
            --cov-report=term-missing --cov-fail-under=40

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t gridpulse:ci .
      - name: Start container
        run: |
          docker run -d -p 8080:8080 --name gp-test -e PRECOMPUTE_ENABLED=false gridpulse:ci
          sleep 15
      - name: Health check
        run: |
          curl -sf http://localhost:8080/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy'"
      - name: Cleanup
        if: always()
        run: docker rm -f gp-test || true
