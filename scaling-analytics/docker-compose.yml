version: "3.8"

services:
  # ── Message Broker ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Cache ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Feature Store / Archive ─────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wattcast
      POSTGRES_PASSWORD: wattcast_dev
      POSTGRES_DB: wattcast
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wattcast"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Server (read-only, no model imports) ────
  api:
    build:
      context: ..
      dockerfile: scaling-analytics/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      V1_ROOT: /app/v1
      PYTHONPATH: /app/v1:/app/scaling-analytics
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Airflow (standalone mode for dev) ───────────
  airflow:
    image: apache/airflow:2.8.1-python3.11
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://wattcast:wattcast_dev@postgres:5432/wattcast
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      DATABASE_URL: postgresql://wattcast:wattcast_dev@postgres:5432/wattcast
      EIA_API_KEY: ${EIA_API_KEY:-}
      V1_ROOT: /app/v1
      PYTHONPATH: /app/v1:/app/scaling-analytics
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/app/scaling-analytics/src
      - ./config.py:/app/scaling-analytics/config.py
      - ../data:/app/v1/data
      - ../models:/app/v1/models
      - ../simulation:/app/v1/simulation
      - ../personas:/app/v1/personas
      - ../observability.py:/app/v1/observability.py
      - ../config.py:/app/v1/config.py
      - ../.env:/app/v1/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@wattcast.dev 2>/dev/null;
        airflow scheduler -D &&
        airflow webserver
      "

volumes:
  pgdata:
